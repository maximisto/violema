server {
    listen 80;
    server_name __APP_DOMAIN__ www.__APP_DOMAIN__ __LEGACY_DOMAIN__ www.__LEGACY_DOMAIN__;
    return 301 https://__APP_DOMAIN__$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.__APP_DOMAIN__;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/__APP_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__APP_DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://__APP_DOMAIN__$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name __APP_DOMAIN__;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/__APP_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__APP_DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # --- Serve React SPA (frontend dist) ---
    root __APP_DIR__/frontend/dist;
    index index.html;

    # Cache static assets aggressively (hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all non-API routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy /api/* → Express backend on port 3001 ---
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Generous timeouts for long AI responses
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
